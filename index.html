<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nazir Pro Edits</title>
<style>
  body { margin:0; font-family: Arial, sans-serif; background:#222; overflow:hidden; }
  #startup { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; color:#fff; text-align:center; transition: opacity 1s ease; }
  #startup.hidden { opacity:0; pointer-events:none; }
  #startup h1 { font-size:4em; margin-bottom:20px; animation: fadeInDown 1s ease; }
  #startup p { font-size:1.5em; margin-bottom:30px; animation: fadeInUp 1s ease 0.5s; }
  #startup button { padding:15px 30px; font-size:1.2em; cursor:pointer; background:#ff6600; color:#fff; border:none; border-radius:8px; animation: fadeIn 1s ease 1s; }
  #startup button:hover { background:#ff8533; }

  @keyframes fadeInDown { from { opacity:0; transform:translateY(-50px);} to { opacity:1; transform:translateY(0);} }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(50px);} to { opacity:1; transform:translateY(0);} }
  @keyframes fadeIn { from { opacity:0;} to { opacity:1;} }

  #editor { display:none; padding:10px; background:#f0f0f0; min-height:100vh; }
  #toolbar { display:flex; flex-wrap:wrap; background:#333; padding:5px; }
  .tool { color:#fff; background:#555; border:none; padding:10px; margin:2px; cursor:pointer; border-radius:5px; }
  .tool:hover { background:#777; }
  #canvas { border:1px solid #333; display:block; margin:20px auto; background:#fff; }
</style>
</head>
<body>

<div id="startup">
  <h1>Welcome to Nazir Pro Edits</h1>
  <p>We provide professional editing tools to enhance your creativity.</p>
  <button id="startBtn">Choose File to Start</button>
  <input type="file" id="fileLoader" style="display:none">
</div>

<div id="editor">
  <div id="toolbar">
    <button class="tool" onclick="setTool('pencil')">Pencil</button>
    <button class="tool" onclick="setTool('line')">Line</button>
    <button class="tool" onclick="setTool('rectangle')">Rectangle</button>
    <button class="tool" onclick="setTool('circle')">Circle</button>
    <button class="tool" onclick="setTool('triangle')">Triangle</button>
    <button class="tool" onclick="setTool('ellipse')">Ellipse</button>
    <button class="tool" onclick="setTool('star')">Star</button>
    <button class="tool" onclick="setTool('text')">Text</button>
    <button class="tool" onclick="setTool('eraser')">Eraser</button>
    <button class="tool" onclick="setTool('fill')">Fill</button>
    <button class="tool" onclick="setTool('spray')">Spray</button>
    <button class="tool" onclick="setTool('lineWidth')">Line Width</button>
    <button class="tool" onclick="setTool('color')">Color</button>
    <button class="tool" onclick="undo()">Undo</button>
    <button class="tool" onclick="redo()">Redo</button>
    <button class="tool" onclick="clearCanvas()">Clear</button>
    <button class="tool" onclick="zoomIn()">Zoom +</button>
    <button class="tool" onclick="zoomOut()">Zoom -</button>
    <button class="tool" onclick="saveCanvas()">Save</button>
    <button class="tool" onclick="loadImage()">Load Image</button>
  </div>
  <canvas id="canvas" width="800" height="500"></canvas>
  <input type="color" id="colorPicker" style="display:none">
</div>

<script>
const startup = document.getElementById('startup');
const startBtn = document.getElementById('startBtn');
const editor = document.getElementById('editor');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let drawing=false, tool='pencil', startX, startY;
let history = [], redoStack=[];
let color = '#000';
let lineWidth = 2;

startBtn.addEventListener('click', ()=>{ document.getElementById('fileLoader').click(); });

document.getElementById('fileLoader').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(evt){
      const img = new Image();
      img.src = evt.target.result;
      img.onload = ()=>{
        startup.classList.add('hidden');
        setTimeout(()=>{ startup.style.display='none'; editor.style.display='block'; ctx.drawImage(img,0,0,canvas.width,canvas.height); saveState(); }, 1000);
      };
    };
    reader.readAsDataURL(file);
  }
});

function setTool(t){ if(t==='color'){ document.getElementById('colorPicker').click(); return; } if(t==='lineWidth'){ lineWidth=prompt('Enter line width:', lineWidth)||lineWidth; return; } tool=t; }
document.getElementById('colorPicker').addEventListener('change', e=>{ color=e.target.value; });

canvas.addEventListener('mousedown', e=>{ drawing=true; startX=e.offsetX; startY=e.offsetY; if(tool==='fill'){ ctx.fillStyle=color; ctx.fillRect(0,0,canvas.width,canvas.height); saveState(); drawing=false; } });
canvas.addEventListener('mousemove', e=>{ if(!drawing) return; let x=e.offsetX, y=e.offsetY; ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=lineWidth; ctx.lineCap='round'; if(tool==='pencil'){ ctx.beginPath(); ctx.moveTo(startX,startY); ctx.lineTo(x,y); ctx.stroke(); startX=x; startY=y; } else if(tool==='eraser'){ ctx.clearRect(x-lineWidth/2,y-lineWidth/2,lineWidth,lineWidth); startX=x; startY=y; } });
canvas.addEventListener('mouseup', e=>{ if(!drawing) return; drawing=false; let x=e.offsetX, y=e.offsetY; ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=lineWidth; if(tool==='line'){ ctx.beginPath(); ctx.moveTo(startX,startY); ctx.lineTo(x,y); ctx.stroke(); } if(tool==='rectangle'){ ctx.strokeRect(startX,startY,x-startX,y-startY); } if(tool==='circle'){ let r=Math.hypot(x-startX,y-startY); ctx.beginPath(); ctx.arc(startX,startY,r,0,2*Math.PI); ctx.stroke(); } if(tool==='triangle'){ ctx.beginPath(); ctx.moveTo(startX,startY); ctx.lineTo(x,y); ctx.lineTo(2*startX-x,y); ctx.closePath(); ctx.stroke(); } if(tool==='ellipse'){ ctx.beginPath(); ctx.ellipse((startX+x)/2,(startY+y)/2,Math.abs(x-startX)/2,Math.abs(y-startY)/2,0,0,2*Math.PI); ctx.stroke(); } if(tool==='star'){ drawStar(startX,startY,x,y); } if(tool==='text'){ let txt=prompt('Enter text:'); if(txt) ctx.fillText(txt,x,y); } if(tool==='spray'){ spray(startX,startY); } saveState(); });

function drawStar(sx,sy,ex,ey){ let spikes=5; let outerRadius=Math.abs(ex-sx)/2; let innerRadius=outerRadius/2; let cx=(sx+ex)/2, cy=(sy+ey)/2; let rot=Math.PI/2*3; let x=cx, y=cy; let step=Math.PI/spikes; ctx.beginPath(); ctx.moveTo(cx,cy-outerRadius); for(let i=0;i<spikes;i++){ x=cx+Math.cos(rot)*outerRadius; y=cy+Math.sin(rot)*outerRadius; ctx.lineTo(x,y); rot+=step; x=cx+Math.cos(rot)*innerRadius; y=cy+Math.sin(rot)*innerRadius; ctx.lineTo(x,y); rot+=step; } ctx.closePath(); ctx.stroke(); }
function spray(x,y){ for(let i=0;i<50;i++){ let offsetX=Math.random()*20-10; let offsetY=Math.random()*20-10; ctx.fillRect(x+offsetX,y+offsetY,1,1); }}
function saveState(){ history.push(canvas.toDataURL()); redoStack=[]; }
function undo(){ if(history.length>0){ redoStack.push(history.pop()); let img=new Image(); img.src=history[history.length-1]||''; img.onload=()=>ctx.drawImage(img,0,0); }}
function redo(){ if(redoStack.length>0){ let imgData=redoStack.pop(); let img=new Image(); img.src=imgData; img.onload=()=>ctx.drawImage(img,0,0); history.push(imgData); }}
function clearCanvas(){ ctx.clearRect(0,0,canvas.width,canvas.height); saveState(); }
function zoomIn(){ canvas.style.transform='scale(1.2)'; canvas.style.transformOrigin='0 0'; }
function zoomOut(){ canvas.style.transform='scale(0.8)'; canvas.style.transformOrigin='0 0'; }
function saveCanvas(){ let link=document.createElement('a'); link.download='drawing.png'; link.href=canvas.toDataURL(); link.click(); }
function loadImage(){ document.getElementById('fileLoader').click(); }
</script>

</body>
</html>
